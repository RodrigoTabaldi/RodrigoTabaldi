<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="45%" stop-color="#0d1b3a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <radialGradient id="glowbg" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glowbg)"/>
  <rect x="1.5" y="1.5" width="1197" height="317" rx="18.5" fill="none" stroke="url(#blue)" stroke-width="1.5" opacity="0.55"/>

  <!-- particulas / estrelas -->
  <g fill="#60a5fa">
    <circle cx="180" cy="55" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="270" r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="45" r="1.8" opacity="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="250" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="70" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- grid hexagonal decorativo direita -->
  <g opacity="0.5" transform="translate(830,70)">
    <g fill="none" stroke="url(#blue)" stroke-width="1.5">
      <rect x="0"   y="0"  width="20" height="20" rx="4" opacity="0.3"/>
      <rect x="28"  y="0"  width="20" height="20" rx="4" opacity="0.6"/>
      <rect x="56"  y="0"  width="20" height="20" rx="4" opacity="0.9"/>
      <rect x="84"  y="0"  width="20" height="20" rx="4" opacity="0.4"/>
      <rect x="112" y="0"  width="20" height="20" rx="4" opacity="0.7"/>
      <rect x="0"   y="28" width="20" height="20" rx="4" opacity="0.7"/>
      <rect x="28"  y="28" width="20" height="20" rx="4" opacity="1"/>
      <rect x="56"  y="28" width="20" height="20" rx="4" opacity="0.5"/>
      <rect x="84"  y="28" width="20" height="20" rx="4" opacity="0.8"/>
      <rect x="112" y="28" width="20" height="20" rx="4" opacity="0.3"/>
      <rect x="0"   y="56" width="20" height="20" rx="4" opacity="0.4"/>
      <rect x="28"  y="56" width="20" height="20" rx="4" opacity="0.6"/>
      <rect x="56"  y="56" width="20" height="20" rx="4" opacity="0.9"/>
      <rect x="84"  y="56" width="20" height="20" rx="4" opacity="0.5"/>
      <rect x="112" y="56" width="20" height="20" rx="4" opacity="0.7"/>
      <rect x="0"   y="84" width="20" height="20" rx="4" opacity="0.6"/>
      <rect x="28"  y="84" width="20" height="20" rx="4" opacity="0.9"/>
      <rect x="56"  y="84" width="20" height="20" rx="4" opacity="0.4"/>
      <rect x="84"  y="84" width="20" height="20" rx="4" opacity="0.8"/>
      <rect x="112" y="84" width="20" height="20" rx="4" opacity="0.5"/>
      <animate attributeName="opacity" values="0.5;0.85;0.5" dur="5s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- terminal dots -->
  <g transform="translate(75,80)">
    <circle cx="0"  cy="0" r="6.5" fill="#ff5f56"/>
    <circle cx="22" cy="0" r="6.5" fill="#ffbd2e"/>
    <circle cx="44" cy="0" r="6.5" fill="#27c93f"/>
  </g>

  <text x="75" y="150" font-family="'JetBrains Mono','Fira Code',monospace" font-size="46" font-weight="800" fill="url(#name)" filter="url(#soft)">
    Rodrigo Tabaldi
  </text>

  <text x="76" y="196" font-family="'JetBrains Mono',monospace" font-size="21" font-weight="600" fill="#60a5fa">
    <tspan fill="#475569">&gt; </tspan>Full Stack Developer<tspan fill="#475569"> · Rondonópolis-MT</tspan>
  </text>

  <text x="76" y="236" font-family="'JetBrains Mono',monospace" font-size="16.5" fill="#7dd3fc">
    C# · .NET · React · TypeScript · SQL Server · Python
    <animate attributeName="opacity" values="0.65;1;0.65" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- cursor -->
  <rect x="76" y="252" width="13" height="22" rx="2" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- barra animada base -->
  <rect x="76" y="288" width="0" height="3" rx="1.5" fill="url(#blue)">
    <animate attributeName="width" values="0;680;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
